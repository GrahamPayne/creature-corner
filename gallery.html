    <script>
        // Mobile menu toggle
        document.querySelector('.nav-toggle').addEventListener('click', function() {
            document.querySelector('.nav-links').classList.toggle('active');
            this.classList.toggle('active');
        });

        // Lightbox functionality
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightbox-image');
        const lightboxCounter = document.getElementById('lightbox-counter');
        const galleryItems = document.querySelectorAll('.gallery-item');
        const totalImages = 60;
        let currentIndex = 0;

        function getFullImagePath(index) {
            const num = String(index + 1).padStart(3, '0');
            return `assets/images/gallery/full/specimen-${num}.jpg`;
        }

        function openLightbox(index) {
            currentIndex = index;
            lightboxImage.src = getFullImagePath(index);
            lightboxImage.alt = `Specimen CC-${String(index + 1).padStart(3, '0')}`;
            lightboxCounter.textContent = `${index + 1} / ${totalImages}`;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function navigate(direction) {
            currentIndex = (currentIndex + direction + totalImages) % totalImages;
            lightboxImage.src = getFullImagePath(currentIndex);
            lightboxImage.alt = `Specimen CC-${String(currentIndex + 1).padStart(3, '0')}`;
            lightboxCounter.textContent = `${currentIndex + 1} / ${totalImages}`;
        }

        // Event listeners
        galleryItems.forEach(item => {
            item.addEventListener('click', () => {
                const index = parseInt(item.dataset.index, 10);
                openLightbox(index);
            });
        });

        document.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
        document.querySelector('.lightbox-prev').addEventListener('click', () => navigate(-1));
        document.querySelector('.lightbox-next').addEventListener('click', () => navigate(1));

        // Close on background click
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navigate(-1);
            if (e.key === 'ArrowRight') navigate(1);
        });
    </script>
